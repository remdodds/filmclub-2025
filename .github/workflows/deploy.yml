name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'static/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'package.json'
              - 'package-lock.json'
            functions:
              - 'functions/**'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Install functions dependencies
        if: steps.changes.outputs.functions == 'true' || github.event_name == 'workflow_dispatch'
        run: cd functions && npm ci

      - name: Build functions
        if: steps.changes.outputs.functions == 'true' || github.event_name == 'workflow_dispatch'
        run: cd functions && npm run build

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > ${{ github.workspace }}/gcp-key.json
          npm install -g firebase-tools

          DEPLOY_TARGETS=""
          if [ "${{ steps.changes.outputs.frontend }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOY_TARGETS="${DEPLOY_TARGETS},hosting"
          fi
          if [ "${{ steps.changes.outputs.functions }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOY_TARGETS="${DEPLOY_TARGETS},functions"
          fi
          if [ "${{ steps.changes.outputs.firestore }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOY_TARGETS="${DEPLOY_TARGETS},firestore:rules,firestore:indexes"
          fi
          DEPLOY_TARGETS="${DEPLOY_TARGETS#,}"
          if [ -z "$DEPLOY_TARGETS" ]; then
            DEPLOY_TARGETS="functions,hosting,firestore:rules,firestore:indexes"
          fi

          echo "Deploying: $DEPLOY_TARGETS"
          firebase deploy --only "${DEPLOY_TARGETS}" --project filmclubapi --force

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_CLUB_PASSWORD: ${{ secrets.E2E_CLUB_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
